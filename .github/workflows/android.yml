name: Android CI

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Extract ZIP
      run: |
        unzip MyphpTracker.zip
        ls -la
        find . -name "gradlew" 
        
    - name: Make gradlew executable
      run: chmod +x $(find . -name "gradlew")
      
    - name: Build APK
      run: $(find . -name "gradlew") assembleDebug --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-debug
        path: "**/app-debug.apk"
